name: Rebuild fonts.json

on:
  workflow_dispatch:  # triggered via API call from Edge Function after upload

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Regenerate fonts.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node -e "
          require('dotenv').config();
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');
          const path = require('path');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);
          const BUCKET = 'fonts';
          const ALLOWED = ['.ttf','.otf','.woff','.woff2'];
          function fmt(bytes) {
            if (!bytes) return '0 B';
            const u = ['B','KB','MB','GB'];
            const i = Math.floor(Math.log(bytes)/Math.log(1024));
            return i===0 ? bytes+' B' : (bytes/Math.pow(1024,i)).toFixed(1)+' '+u[i];
          }
          (async () => {
            let all = [], offset = 0;
            while(true) {
              const { data, error } = await supabase.storage.from(BUCKET).list('', { limit:1000, offset, sortBy:{column:'name',order:'asc'} });
              if(error||!data||!data.length) break;
              all = all.concat(data);
              if(data.length < 1000) break;
              offset += 1000;
            }
            const fonts = all
              .filter(f => ALLOWED.includes(path.extname(f.name).toLowerCase()))
              .map(f => {
                const ext = path.extname(f.name).toLowerCase();
                const raw = path.basename(f.name, ext);
                const name = raw.replace(/[_-]/g,' ').replace(/\s+/g,' ').trim();
                const { data: { publicUrl } } = supabase.storage.from(BUCKET).getPublicUrl(f.name);
                return { name, fileName: f.name, extension: ext.slice(1), size: fmt(f.metadata?.size||0), sizeBytes: f.metadata?.size||0, url: publicUrl };
              });
            fs.writeFileSync('fonts.json', JSON.stringify(fonts, null, 2));
            console.log('Done:', fonts.length, 'fonts');
          })();
          "

      - name: Commit and push fonts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fonts.json
          git diff --staged --quiet || git commit -m "Auto-update fonts.json after new upload"
          git push
